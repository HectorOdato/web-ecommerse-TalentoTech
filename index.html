<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto-pre-entrega</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="contenedor-header">
        <h1 class="titulo">ZStride</h1>
        <nav class="menubar">
            <ul class="lista">
                <li>Inicio</li>
                <li><a href="/pages/contact.html">Contacto</a></li>
                <li>Articulos</li>
            </ul>
        </nav>
        </div>
    </header>
    <main>
        <section class="section-articulos">
            <div class="contenedor-articulo">
                <img src="img/DC60111004_1_800x.webp" alt="Articulo">
                <p class="art-price">$159.999,00</p>
                <p class="art-name">Zapatillas Dc Court Graffik Ss Black White</p>
                <button type="button" class="art-button">Añadir al carrito</button>
            </div>
            <div class="contenedor-articulo">
                <img src="img/dc60117031_2_800x.webp" alt="Articulo">
                <p class="art-price">$159.999,00</p>
                <p class="art-name">Zapatillas Dc Court Graffik Ss Black</p>
                <button type="button" class="art-button">Añadir al carrito</button>
            </div>
            <div class="contenedor-articulo">
                <img src="img/DC60118002_2_800x.webp" alt="Articulo">
                <p class="art-price">$129.999,00</p>
                <p class="art-name">Zapatillas Dc Manteca 4 S</p>
                <button type="button" class="art-button">Añadir al carrito</button>
            </div>
            <div class="contenedor-articulo">
                <img src="img/DC60118001_8_52b63de1-75eb-4741-817d-83701012914e_800x.webp" alt="Articulo">
                <p class="art-price">$169.999,00</p>
                <p class="art-name">Zapatillas Dc Manteca 4 Hi Black</p>
                <button type="button" class="art-button">Añadir al carrito</button>
            </div>
        </section>
        <hr>
        <section class="section-contacto">
            <h2 class="titulo-contacto">Contactanos</h2>
            <form action="" method="post">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
                <label for="email">Correo electronico:</label>
                <input type="email" id="email" name="email" placeholder="Ingrese su correo" required>
                <label for="mensaje">Mensaje:</label>
                <textarea name="mensaje" id="mensaje" rows="5"></textarea>
                <button class="button-form"  type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>
        <p>proyecto pre entrega para TalentoTech</p>
    </footer>
</body>
</html>
