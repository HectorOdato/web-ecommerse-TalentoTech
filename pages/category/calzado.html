        </nav>
    </header>
    <main>
        <section>
            <img src="../../../img/imageportada.webp
            " alt="promocion" class="imagen-promo">
        </section>
        <h2 class="titulo-product">CALZADOS</h2>
        <section class="section-articulos">
            <script>
                const seccionArticulos = document.querySelector('.section-articulos');
                const categoria = '6a50ee042478b3c06a5c81a8'; 
                const apiUrl = `https://backend-web-ecommerse-talentotech.onrender.com/productos/categoria/${categoria}`; 


                async function fetchProducts() {
                    try {
                        const response = await fetch(apiUrl);
                        if (!response.ok) {
                            throw new Error('Error al obtener los productos');
                        }
                        const productos = await response.json()
                        renderProducts(productos);
                    } catch (error) {
                        console.error('Error al obtener los productos:', error);
                    }
                }

                function renderProducts(productos) {
                    seccionArticulos.innerHTML = '';

                    productos.forEach(producto => {
                            const productHTML = `<div class="contenedor-articulo">` +
                            `<img src="${producto.imagenURL}" alt="${producto.nombre}">` +
                            `<p class="art-precio">$${producto.precio.toLocaleString('es-AR')}</p>` +
                            `<p class="art-nombre">${producto.nombre}</p>` +
                            `<button type="button" class="art-boton" data-id="${producto.id}">Añadir al carrito</button>` +
                            `</div>`;;
                            seccionArticulos.innerHTML += productHTML;
                        
                    });
                }
                fetchProducts();
            </script>
        </section>
        <hr>
    </main>
